<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的靈感儀表板 v2.0 (自動同步版)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: var(--primary-color);
            letter-spacing: 1px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .link-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .link-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }
        .cover-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #dfe6e9;
        }
        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.5;
            color: var(--primary-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .btn {
            display: block;
            text-align: center;
            padding: 12px;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            transition: background 0.3s;
        }
        .btn:hover { background: #2980b9; }

        /* 載入中與錯誤提示 */
        #status {
            text-align: center;
            margin-top: 50px;
            font-size: 1.1em;
            color: #7f8c8d;
        }
        .error-msg {
            background: #fab1a0;
            color: #d63031;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>我的靈感儀表板</h1>
        <p style="color: #95a5a6; font-size: 0.9em;">(資料每小時自動更新一次)</p>
    </div>

    <div id="status">正在同步雲端收藏...</div>
    <div id="dashboard" class="dashboard"></div>

    <script>
        async function fetchRaindrops() {
            const statusEl = document.getElementById('status');
            const dashboardEl = document.getElementById('dashboard');

            try {
                // 自動化 2.0 關鍵：直接讀取同目錄下的 data.json
                const response = await fetch('./data.json?t=' + new Date().getTime()); // 加時間戳避免快取
                
                if (!response.ok) {
                    throw new Error('尚未偵測到數據檔案。請確保 GitHub Actions 已成功執行過一次並產生 data.json。');
                }

                const data = await response.json();
                statusEl.style.display = 'none';
                
                if (!data.items || data.items.length === 0) {
                    statusEl.innerHTML = '目前的收藏夾是空的。';
                    statusEl.style.display = 'block';
                    return;
                }

                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'link-card';
                    // 優先使用 Raindrop 的縮圖，若無則使用預設圖
                    const cover = item.cover || 'https://via.placeholder.com/300x180?text=No+Image';
                    
                    card.innerHTML = `
                        <img src="${cover}" class="cover-img" loading="lazy">
                        <div class="card-content">
                            <div class="card-title">${item.title || '無標題'}</div>
                            <a href="${item.link}" target="_blank" class="btn">立即觀看</a>
                        </div>
                    `;
                    dashboardEl.appendChild(card);
                });

            } catch (err) {
                statusEl.innerHTML = `
                    <div class="error-msg">
                        <h3>⏳ 等待首次資料同步...</h3>
                        <p>${err.message}</p>
                        <p style="font-size: 0.8em; margin-top:10px;">
                            請確認你的 GitHub Actions 已經跑完綠色勾勾，<br>且倉庫裡已經出現 data.json 檔案。
                        </p>
                    </div>
                `;
            }
        }

        fetchRaindrops();
    </script>
</body>
</html>
