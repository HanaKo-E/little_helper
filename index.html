<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏儀表板 V3.5</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        /* 手機解鎖按鈕：半透明隱藏式設計 */
        .unlock-btn {
            opacity: 0.2;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 20px;
            transition: opacity 0.3s;
        }
        .unlock-btn:hover { opacity: 1; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .link-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        .link-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .cover-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #e9ecef;
        }
        .card-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-title {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .btn {
            display: block;
            text-align: center;
            padding: 10px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover { background: #0056b3; }

        /* 警告與提示 */
        .msg-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 12px;
            text-align: center;
        }
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            color: #d63384;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>我的收藏儀表板</h1>
        <button class="unlock-btn" onclick="unlockDevice()" title="手機端解鎖">🔓</button>
    </div>

    <div id="status"></div>
    <div id="dashboard" class="dashboard"></div>

    <script>
        // 1. 嘗試獲取權杖
        const TOKEN = localStorage.getItem('MY_RAIN_TOKEN');
        const statusEl = document.getElementById('status');
        const dashboardEl = document.getElementById('dashboard');

        // 手機與電腦通用的解鎖函數
        function unlockDevice() {
            const token = prompt("請貼入你的 Raindrop 權杖 (Token)：");
            if (token && token.trim().length > 10) {
                localStorage.setItem('MY_RAIN_TOKEN', token.trim());
                alert("權杖已存入！網頁即將重新整理。");
                location.reload();
            } else if (token) {
                alert("權杖格式似乎不正確，請重新檢查。");
            }
        }

        async function fetchRaindrops() {
            if (!TOKEN) {
                statusEl.innerHTML = `
                    <div class="msg-container">
                        <h3>⚠️ 尚未偵測到權杖</h3>
                        <p>這是一個安全保護機制。請點擊上方的 🔓 圖示，或在 Console 執行：</p>
                        <code>localStorage.setItem('MY_RAIN_TOKEN', '你的權杖');</code>
                        <p style="margin-top:20px; font-size:0.8em; color: #856404;">(完成後請重新整理網頁)</p>
                    </div>
                `;
                return;
            }

            try {
                // 抓取所有書籤 (0 代表所有)
                const response = await fetch('https://api.raindrop.io/rest/v1/raindrops/0', {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });

                if (!response.ok) throw new Error('權杖無效或 API 限制');

                const data = await response.json();
                
                if (data.items.length === 0) {
                    statusEl.innerHTML = '<div class="msg-container">目前沒有任何收藏連結。</div>';
                    return;
                }

                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'link-card';
                    const cover = item.cover || 'https://via.placeholder.com/300x160?text=No+Image';
                    
                    card.innerHTML = `
                        <img src="${cover}" class="cover-img" loading="lazy">
                        <div class="card-content">
                            <div class="card-title">${item.title || '無標題'}</div>
                            <a href="${item.link}" target="_blank" class="btn">立即觀看 →</a>
                        </div>
                    `;
                    dashboardEl.appendChild(card);
                });

            } catch (err) {
                statusEl.innerHTML = `
                    <div class="msg-container" style="background:#f8d7da; border-color:#f5c6cb; color:#721c24;">
                        <h3>❌ 抓取失敗</h3>
                        <p>${err.message}</p>
                        <button onclick="localStorage.removeItem('MY_RAIN_TOKEN'); location.reload();">重設權杖</button>
                    </div>
                `;
            }
        }

        fetchRaindrops();
    </script>
</body>
</html>
