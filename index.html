<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的跨平台收藏儀表板</title>
    <style>
        :root { --primary-color: #007bff; --bg-color: #f4f7f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .link-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; position: relative; }
        .link-card:hover { transform: translateY(-5px); }
        .cover-img { width: 100%; height: 160px; object-fit: cover; background: #ddd; }
        .card-content { padding: 15px; }
        .card-title { font-size: 1.1em; font-weight: bold; color: #222; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em; }
        .btn { display: inline-block; padding: 8px 16px; background: var(--primary-color); color: white; text-decoration: none; border-radius: 6px; font-size: 0.9em; }
        .status-msg { text-align: center; padding: 50px; color: #666; font-size: 1.2em; }
        .setup-guide { background: #fff3cd; border: 1px solid #ffeeba; padding: 20px; border-radius: 8px; max-width: 600px; margin: 20px auto; line-height: 1.8; }
        code { background: #eee; padding: 2px 5px; border-radius: 4px; color: #d63384; }
    </style>
</head>
<body>

    <h1>我的收藏儀表板</h1>
    <div id="status" class="status-msg">正在檢查權限...</div>
    <div id="dashboard" class="dashboard"></div>

    <script>
        // 【安全機制】從瀏覽器本地存儲空間讀取權杖
        const TOKEN = localStorage.getItem('MY_RAIN_TOKEN');
        const statusEl = document.getElementById('status');
        const dashboardEl = document.getElementById('dashboard');

        async function init() {
            if (!TOKEN) {
                statusEl.innerHTML = `
                    <div class="setup-guide">
                        <strong>⚠️ 尚未偵測到權杖 (Token)</strong><br>
                        為了安全，請在你的瀏覽器中執行以下步驟以解鎖：<br>
                        1. 按下 <code>F12</code> 打開開發者工具。<br>
                        2. 點擊頂部的 <strong>Console</strong> (主控台)。<br>
                        3. 輸入以下指令（替換為你的權杖）：<br>
                        <code>localStorage.setItem('MY_RAIN_TOKEN', '你的權杖貼在這裡');</code><br>
                        4. 按下 Enter 並重新整理網頁。
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch('https://api.raindrop.io/rest/v1/raindrops/0', {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });

                if (!response.ok) throw new Error('權杖失效或 API 錯誤');

                const data = await response.json();
                statusEl.style.display = 'none';

                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'link-card';
                    const cover = item.cover || 'https://via.placeholder.com/300x160?text=No+Image';
                    
                    card.innerHTML = `
                        <img src="${cover}" class="cover-img">
                        <div class="card-content">
                            <div class="card-title">${item.title || '無標題'}</div>
                            <a href="${item.link}" target="_blank" class="btn">立即觀看 →</a>
                        </div>
                    `;
                    dashboardEl.appendChild(card);
                });
            } catch (err) {
                statusEl.innerHTML = '❌ 抓取失敗：' + err.message + '<br>請檢查權杖是否正確。';
            }
        }

        init();
    </script>
</body>
</html>
