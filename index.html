<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小幫手 v3.5</title>
    <style>
        :root {
            /* 定義綠色系色調 */
            --primary-green: #004d40; /* 墨綠色 */
            --accent-green: #2e7d32;  /* 森林綠 */
            --light-green: #a5d6a7;   /* 淺綠色 */
            --bg-color: #f1f8e9;      /* 極淺綠背景 */
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #263238;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { 
            color: var(--primary-green); 
            font-weight: 800;
            letter-spacing: 2px;
        }
        
        /* 篩選按鈕區塊 */
        .filter-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 35px;
            position: sticky;
            top: 15px;
            z-index: 100;
        }
        .filter-btn {
            padding: 10px 22px;
            background: white;
            border: 2px solid var(--primary-green);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            color: var(--primary-green);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        /* 啟動狀態的通用樣式 */
        .filter-btn.active {
            color: white;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .link-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            border-bottom: 4px solid var(--primary-green);
        }
        .link-card.hidden { display: none; }
        
        .link-card:hover { transform: translateY(-8px); }
        .cover-img { width: 100%; height: 170px; object-fit: cover; background: #cfd8dc; }
        .card-content { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.05em; font-weight: 600; margin-bottom: 12px; height: 3em; overflow: hidden; color: #37474f; }
        .tag-badge { 
            font-size: 0.75em; 
            background: var(--bg-color); 
            padding: 3px 10px; 
            border-radius: 6px; 
            margin-right: 6px;
            color: var(--primary-green);
            font-weight: bold;
        }
        .btn {
            text-align: center;
            padding: 12px;
            background: var(--primary-green);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9em;
            margin-top: auto;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="header">
        <h1>我的小幫手</h1>
    </div>

    <div id="filter-bar" class="filter-container">
        <button class="filter-btn active" style="background-color: #004d40; color: white;" onclick="filterContent('all', this)">全部</button>
    </div>

    <div id="status">同步我的小幫手中...</div>
    <div id="dashboard" class="dashboard"></div>

    <script>
        let allItems = [];
        // 不同層次的綠色陣列（包含墨綠色）
        const greenShades = [
            '#004d40', // 墨綠
            '#00695c', 
            '#2e7d32', // 森林綠
            '#43a047', 
            '#66bb6a', 
            '#81c784'  // 淺綠
        ];

        async function init() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                const data = await response.json();
                allItems = data.items;
                document.getElementById('status').style.display = 'none';
                
                renderFilters(allItems);
                renderCards(allItems);
            } catch (err) {
                document.getElementById('status').innerText = '小幫手資料讀取失敗。';
            }
        }

        function renderFilters(items) {
            const filterBar = document.getElementById('filter-bar');
            const tags = new Set();
            items.forEach(item => {
                if (item.tags) item.tags.forEach(t => tags.add(t));
            });

            // 將標籤分配不同的綠色
            let colorIndex = 0;
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = tag;
                
                // 分配顏色循環
                const currentColor = greenShades[colorIndex % greenShades.length];
                btn.dataset.color = currentColor;
                btn.style.borderColor = currentColor;
                btn.style.color = currentColor;

                btn.onclick = () => filterContent(tag, btn);
                filterBar.appendChild(btn);
                colorIndex++;
            });
        }

        function renderCards(items) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.dataset.tags = JSON.stringify(item.tags || []);
                
                const tagHtml = (item.tags || []).map(t => `<span class="tag-badge">${t}</span>`).join('');
                
                card.innerHTML = `
                    <img src="${item.cover || 'https://via.placeholder.com/300x160?text=No+Image'}" class="cover-img">
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div style="margin-bottom:15px;">${tagHtml}</div>
                        <a href="${item.link}" target="_blank" class="btn">立即前往</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterContent(tag, btnEl) {
            // 重置所有按鈕樣式（恢復空心）
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active');
                b.style.backgroundColor = 'white';
                b.style.color = b.dataset.color || '#004d40';
            });

            // 啟動當前按鈕（變為實心）
            btnEl.classList.add('active');
            const activeColor = btnEl.dataset.color || '#004d40';
            btnEl.style.backgroundColor = activeColor;
            btnEl.style.color = 'white';

            // 過濾卡片
            document.querySelectorAll('.link-card').forEach(card => {
                const cardTags = JSON.parse(card.dataset.tags);
                if (tag === 'all' || cardTags.includes(tag)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        init();
    </script>
</body>
</html>
