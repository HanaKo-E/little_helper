<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小幫手 - 穩定版</title>
    <style>
        :root { --primary-green: #31483c; --bg-color: #f1f8e9; }
        body { font-family: sans-serif; background: var(--bg-color); padding: 15px; margin: 0; }
        
        .controls-container { max-width: 800px; margin: 0 auto 15px; position: sticky; top: 10px; z-index: 100; }
        #search-input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--primary-green); outline: none; box-sizing: border-box; }
        
        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; border: none; color: white; cursor: pointer; font-weight: bold; opacity: 0.6; transition: 0.3s; }
        .filter-btn.active { opacity: 1; transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        /* 卡片樣式 */
        .link-card { background: white; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-title { font-weight: bold; margin-bottom: 10px; padding-right: 40px; }
        .tag-badge { font-size: 11px; background: #e8f5e9; padding: 3px 8px; border-radius: 5px; color: var(--primary-green); margin: 0 4px 4px 0; display: inline-block; }
        
        /* 箭頭按鈕 - 絕對定位防擠壓 */
        .btn { position: absolute; right: 15px; top: 15px; width: 35px; height: 35px; background: var(--primary-green); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <input type="text" id="search-input" placeholder="🔍 搜尋標題或備註..." onkeyup="handleSearch()">
    </div>
    
    <div id="filter-bar" class="filter-container"></div>
    <div id="dashboard" class="dashboard"></div>

<script>
    // 自動修剪空格的強化腳本
    async function loadData() {
        try {
            const response = await fetch('./data.json');
            const data = await response.json();
            const items = data.items;
            
            renderFilters(items);
            renderCards(items);
        } catch (err) {
            console.error("資料載入失敗:", err);
            document.getElementById('dashboard').innerHTML = "載入失敗，請檢查 data.json 格式";
        }
    }

    function renderFilters(items) {
        const bar = document.getElementById('filter-bar');
        const tagSet = new Set();
        
        // 抓取所有項目的第一個標籤，並強行去除空格
        items.forEach(item => {
            if (item.tags && item.tags.length > 0) {
                tagSet.add(item.tags[0].trim());
            }
        });

        bar.innerHTML = `<button class="filter-btn active" style="background:#31483c" onclick="filterContent('all', this)">全部</button>`;
        
        const colors = ['#4b645a', '#658078', '#7f9c96', '#99b9b4', '#3498db'];
        Array.from(tagSet).forEach((tag, idx) => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.innerText = tag;
            btn.style.background = colors[idx % colors.length];
            btn.onclick = () => filterContent(tag, btn);
            bar.appendChild(btn);
        });
    }

    function renderCards(items) {
        const container = document.getElementById('dashboard');
        container.innerHTML = '';
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'link-card';
            
            // 重要：這裡儲存 tag 時也強行去除空格
            const primaryTag = (item.tags && item.tags.length > 0) ? item.tags[0].trim() : "未分類";
            card.dataset.tag = primaryTag;
            card.dataset.fulltext = (item.title + (item.note || "")).toLowerCase();

            card.innerHTML = `
                <div class="card-title">${item.title}</div>
                <div>${item.tags.map(t => `<span class="tag-badge">${t}</span>`).join('')}</div>
                <a href="${item.link}" target="_blank" class="btn">➜</a>
            `;
            container.appendChild(card);
        });
    }

    function filterContent(tag, btn) {
        // 1. 切換按鈕樣式
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 2. 執行過濾
        document.querySelectorAll('.link-card').forEach(card => {
            if (tag === 'all' || card.dataset.tag === tag) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    }

    function handleSearch() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.link-card').forEach(card => {
            card.style.display = card.dataset.fulltext.includes(q) ? 'flex' : 'none';
        });
    }

    // 啟動
    loadData();
</script>
</body>
</html>
